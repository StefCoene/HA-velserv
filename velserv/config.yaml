name: "VelServ"
description: "TCP-to-Velbus gateway — share a single USB Velbus interface over TCP with multiple clients (VelbusLink, Home Assistant, OpenHAB, ...). Check the addon logs at startup to find the correct device path."
version: "1.7.1"
slug: "velserv"
url: "https://github.com/StefCoene/HA-velserv"
init: false

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

startup: application
boot: auto

uart: true

ports:
  3788/tcp: 3788

ports_description:
  3788/tcp: "TCP port for Velbus clients — use this port in VelbusLink, Home Assistant, or other Velbus software"

options:
  device: "/dev/ttyACM0"
  verbose_level: 0

schema:
  device: str
  verbose_level: int(0,6)
