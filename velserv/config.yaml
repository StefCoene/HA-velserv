name: "VelServ"
description: "TCP-to-Velbus gateway — share a single USB Velbus interface over TCP with multiple clients simultaneously (VelbusLink, Home Assistant, OpenHAB, ...)"
version: "1.6.4"
slug: "velserv"
url: "https://github.com/StefCoene/HA-velserv"
init: false

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

startup: application
boot: auto

host_network: true
uart: true

options:
  device: "/dev/ttyACM0"
  port: 3788
  verbose: false

schema:
  device: str
  port: int(1024,65535)
  verbose: bool
